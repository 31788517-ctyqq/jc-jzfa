<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fire1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffea00"/>
      <stop offset="50%" stop-color="#ff7b00"/>
      <stop offset="100%" stop-color="#ff1e00"/>
    </linearGradient>

    <linearGradient id="fire2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd000"/>
      <stop offset="100%" stop-color="#ff3300"/>
    </linearGradient>

    <radialGradient id="ballLight" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d9d9d9"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path d="
      M180 500
      C80 430,120 260,280 220
      C220 140,330 100,420 170
      C430 70,560 90,610 180
      C700 120,790 190,780 280
      C900 260,970 390,900 500
      C980 610,930 760,780 810
      C660 860,520 820,420 770
      C280 700,220 620,180 500Z"
      fill="url(#fire1)"/>

    <path d="
      M240 500
      C160 450,180 320,310 280
      C280 220,360 180,430 240
      C450 170,540 180,590 250
      C680 210,760 260,740 340
      C820 340,860 430,820 510
      C860 620,790 720,690 750
      C560 790,450 760,350 690
      C260 640,230 580,240 500Z"
      fill="url(#fire2)"
      opacity="0.9"/>
  </g>

  <g transform="translate(540 540)">
    <circle cx="0" cy="0" r="240" fill="url(#ballLight)" stroke="#000" stroke-width="18"/>

    <polygon points="
      0,-70
      60,-35
      60,35
      0,70
      -60,35
      -60,-35"
      fill="#111"/>

    <polygon points="-60,-35 -130,-90 -90,-170 0,-150 0,-70" fill="#fff" stroke="#111" stroke-width="10"/>
    <polygon points="60,-35 130,-90 90,-170 0,-150 0,-70" fill="#fff" stroke="#111" stroke-width="10"/>
    <polygon points="-60,35 -130,100 -80,180 0,150 0,70" fill="#fff" stroke="#111" stroke-width="10"/>
    <polygon points="60,35 130,100 80,180 0,150 0,70" fill="#fff" stroke="#111" stroke-width="10"/>
    <polygon points="-130,-90 -200,-20 -180,90 -130,100 -60,35 -60,-35" fill="#fff" stroke="#111" stroke-width="10"/>
    <polygon points="130,-90 200,-20 180,90 130,100 60,35 60,-35" fill="#fff" stroke="#111" stroke-width="10"/>

    <ellipse cx="-70" cy="-90" rx="60" ry="30" fill="#ffffff" opacity="0.55"/>
    <ellipse cx="90" cy="70" rx="45" ry="22" fill="#ffffff" opacity="0.35"/>
  </g>
</svg>
