<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF88"/>
      <stop offset="1" stop-color="#00C853"/>
    </linearGradient>

    <linearGradient id="star" x1="340" y1="340" x2="450" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE66D"/>
      <stop offset="1" stop-color="#FFB300"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="36" y="36" width="440" height="440" rx="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Glow ring -->
  <circle cx="256" cy="240" r="122" stroke="#8DFFB7" stroke-width="10" opacity="0.35" filter="url(#glow)"/>

  <!-- Soccer Ball -->
  <g transform="translate(86 70)">
    <circle cx="170" cy="170" r="132" fill="#F8FFF9"/>

    <!-- Hex center -->
    <polygon points="170,122 212,146 212,194 170,218 128,194 128,146"
             fill="#D9E6DC"/>

    <!-- Panels -->
    <path d="M170 122 L170 72 L126 52 L92 84 L128 146 Z" fill="#EAF4ED"/>
    <path d="M212 146 L248 84 L214 52 L170 72 L170 122 Z" fill="#EAF4ED"/>
    <path d="M212 194 L248 256 L214 288 L170 268 L170 218 Z" fill="#EAF4ED"/>
    <path d="M128 194 L92 256 L126 288 L170 268 L170 218 Z" fill="#EAF4ED"/>
    <path d="M92 84 L54 126 L70 186 L128 194 L128 146 Z" fill="#E3F0E7"/>
    <path d="M248 84 L286 126 L270 186 L212 194 L212 146 Z" fill="#E3F0E7"/>

    <!-- Ball outline -->
    <circle cx="170" cy="170" r="132" stroke="#D4E4D8" stroke-width="8"/>
  </g>

  <!-- Star badge -->
  <g transform="translate(320 320)">
    <circle cx="62" cy="62" r="58" fill="#092C13" opacity="0.35"/>
    <circle cx="56" cy="56" r="56" fill="url(#star)" stroke="#FFF4C2" stroke-width="6"/>

    <polygon
      points="56,18 66,44 94,44 72,60 80,88 56,72 32,88 40,60 18,44 46,44"
      fill="#FFF9D7"/>
  </g>
</svg>
