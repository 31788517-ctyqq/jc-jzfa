<script>
// ★ 阻塞脚本：恢复上次页面状态（主页为默认，其他页面由JS动态创建）
(function () {
  try {
    var last = sessionStorage.getItem('lastPage');
    if (last && last !== 'home' && last !== 'detail') {
      var tb = document.getElementById('tab-' + last);
      if (tb) tb.classList.add('active');
      var titles = { match:'今日比赛', plan:'今日方案', 'quant-rank':'量化数据排行榜', rank:'推荐排行榜', hit:'命中率统计', filter:'命中率筛选', income:'方案收入', backtest:'回测分析' };
      var titleEl = document.getElementById('navTitle');
      if (titleEl && titles[last]) titleEl.textContent = titles[last];
    } else {
      var tb = document.getElementById('tab-home');
      if (tb) tb.classList.add('active');
    }
  } catch (e) {}
})();
</script>
